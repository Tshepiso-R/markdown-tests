trigger:
  branches:
    include:
      - main
  paths:
    include:
      - test-plans/**

schedules:
  - cron: "0 3 * * 1-5"
    displayName: "Weekday 3am run"
    branches:
      include:
        - main
    always: true

parameters:
  - name: testPlan
    displayName: "Test plan to execute"
    type: string
    default: "e2e-personal-loan-application"
    values:
      - e2e-personal-loan-application

  - name: environment
    displayName: "Target environment"
    type: string
    default: "QA"
    values:
      - QA

pool:
  vmImage: "ubuntu-latest"

variables:
  - name: NODE_VERSION
    value: "20"

steps:
  - task: NodeTool@0
    displayName: "Install Node.js $(NODE_VERSION)"
    inputs:
      versionSpec: "$(NODE_VERSION)"

  - script: |
      npm install -g @anthropic-ai/claude-code
    displayName: "Install Claude Code CLI"

  - script: |
      npx @anthropic-ai/claude-code --version
    displayName: "Verify Claude Code installed"

  - script: |
      npx playwright install chromium --with-deps
    displayName: "Install Playwright + Chromium"

  - script: |
      npm install -g @playwright/mcp
    displayName: "Install MCP Playwright server"

  - script: |
      mkdir -p ~/.claude
      echo '{"permissions":{"allow":["mcp__playwright__*","Read","Write","Glob","Grep","Bash(*)"],"deny":[]},"mcpServers":{"playwright":{"command":"npx","args":["-y","@playwright/mcp","--headless"]}}}' > ~/.claude/settings.json
      echo "Settings written:"
      cat ~/.claude/settings.json
    displayName: "Configure Claude Code + MCP Playwright"

  - script: |
      echo "Testing Claude Code can run..."
      claude -p "Say OK" --dangerously-skip-permissions --max-turns 1 --verbose 2>&1 || echo "Claude basic test failed with exit code $?"
    displayName: "Smoke test Claude Code"
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
    timeoutInMinutes: 2

  - script: |
      PLAN_NAME="${{ parameters.testPlan }}"
      BUILD_ID="$(Build.BuildId)"
      REPORT_NAME="${PLAN_NAME}-ci-${BUILD_ID}-$(date +%Y-%m-%d)"
      echo "Starting test run: ${REPORT_NAME}"
      cat > /tmp/ci-prompt.txt << PROMPT
      You are running an automated E2E test on Azure DevOps CI. Build ID: ${BUILD_ID}. Instructions: 1. Read test-plans/RULES.md 2. Read test-plans/${PLAN_NAME}.md 3. Execute ALL test cases (TC-01 through TC-08) sequentially 4. For TC-06: you MUST click Awaiting Review and review all 3 tabs (Overview, ID Verification, KYC Verification) before clicking Finalise 5. Generate a report and save it to test-reports/${REPORT_NAME}.md 6. At the end, print a single line: RESULT: PASS or RESULT: FAIL. Environment: QA at landbankcrm-adminportal-qa.shesha.app. Admin account: admin / ${ADMIN_PASSWORD}. RM account: fatima.abrahams@landbank.co.za / ${RM_PASSWORD}. Generate a unique lead name using format: AutoCI${BUILD_ID}. Do NOT skip any steps. Execute every test case fully. Be efficient.
      PROMPT
      claude -p "$(cat /tmp/ci-prompt.txt)" --dangerously-skip-permissions --max-turns 200 --verbose 2>&1 | tee claude-output.log
      EXIT_CODE=${PIPESTATUS[0]}
      echo "Claude exited with code: $EXIT_CODE"
      cp claude-output.log $(Build.ArtifactStagingDirectory)/claude-output.log 2>/dev/null || true
      if [ -f "test-reports/${REPORT_NAME}.md" ]; then
        echo "Report generated successfully"
      else
        echo "##vso[task.logissue type=warning]Report not found"
        ls -la test-reports/ 2>/dev/null || echo "No test-reports directory"
      fi
      if grep -q "RESULT: FAIL" claude-output.log 2>/dev/null; then
        echo "##vso[task.logissue type=error]Test run failed"
        echo "##vso[task.complete result=Failed;]"
      fi
      exit $EXIT_CODE
    displayName: "Run E2E test plan via Claude Code"
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      ADMIN_PASSWORD: $(ADMIN_PASSWORD)
      RM_PASSWORD: $(RM_PASSWORD)
    timeoutInMinutes: 60

  - script: |
      if ls test-reports/*-$(date +%Y-%m-%d).md 1>/dev/null 2>&1; then
        echo "Test report(s) generated:"
        ls -la test-reports/*-$(date +%Y-%m-%d).md
      else
        echo "##vso[task.logissue type=warning]No test report was generated"
      fi
    displayName: "Verify report generated"
    condition: always()

  - task: CopyFiles@2
    displayName: "Stage test reports"
    condition: always()
    inputs:
      SourceFolder: "test-reports"
      Contents: "**/*.md"
      TargetFolder: "$(Build.ArtifactStagingDirectory)/test-reports"

  - task: PublishBuildArtifacts@1
    displayName: "Publish test reports"
    condition: always()
    inputs:
      PathtoPublish: "$(Build.ArtifactStagingDirectory)"
      ArtifactName: "test-results"
      publishLocation: "Container"

  - script: |
      if ls test-reports/*-$(date +%Y-%m-%d).md 1>/dev/null 2>&1; then
        git config user.email "pipeline@dev.azure.com"
        git config user.name "Azure DevOps Pipeline"
        git add test-reports/*.md
        git commit -m "CI: Add test report from pipeline run $(Build.BuildNumber)" || echo "No changes to commit"
        git push origin HEAD:main || echo "##vso[task.logissue type=warning]Could not push report to repo"
      fi
    displayName: "Commit report to repo"
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
