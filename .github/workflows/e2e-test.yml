name: E2E Loan Application Test

# ─────────────────────────────────────────────────────────────
# TRIGGERS — when this workflow runs
# ─────────────────────────────────────────────────────────────
on:
  # Manual trigger — click "Run workflow" in GitHub Actions UI
  workflow_dispatch:

  # Nightly schedule — runs every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

# ─────────────────────────────────────────────────────────────
# JOB: Entity Loan — Close Corporation end-to-end
# Lead -> Pre-screen -> Opportunity -> Directors -> Signatories
# -> Resolution (all directors sign) -> Consent -> Verify -> Onboard
# ─────────────────────────────────────────────────────────────
jobs:
  entity-loan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Set report name
        id: report
        run: |
          PREFIX=${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          NAME="e2e-entity-loan-application-${PREFIX}-$(date +%Y-%m-%dT%H-%M)"
          echo "name=${NAME}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - name: Run tests
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            E2E test on CI. Run ID: ${{ github.run_id }}. Trigger: ${{ steps.report.outputs.prefix }}. BE EFFICIENT.
            1. Read test-plans/RULES.md then test-plans/e2e-entity-loan-application.md
            2. Execute ALL test cases including TC-05c (consent flow).
            3. For TC-05c: Use testmail.app API to retrieve consent email and OTP. Email format: 5s9ku.consent-${{ github.run_id }}@inbox.testmail.app. API: GET https://api.testmail.app/api/json?apikey=${{ secrets.TESTMAIL_API_KEY }}&namespace=5s9ku&tag=consent-${{ github.run_id }}&livequery=true&timeout=60000
            4. For TC-06: click Awaiting Review, review CIPC verification, then Finalise.
            5. Save report to test-reports/${{ steps.report.outputs.name }}.md
            6. Each TC: URL + pass/fail. No screenshots. UX issues at end.
            7. Print RESULT: PASS or RESULT: FAIL
            EFFICIENCY: No screenshots. Batch fill_form. Only snapshot after save/submit.
            Environment: QA at landbankcrm-adminportal-qa.shesha.app
            Admin: admin / ${{ secrets.ADMIN_PASSWORD }} | RM: fatima.abrahams@landbank.co.za / ${{ secrets.RM_PASSWORD }}
            IDs: 7708206169188 (Ian), 7304190225085 (Chamaine), 6311115651080 (Xolile), Reg: 2012/225386/07
            Email for lead: 5s9ku.consent-${{ github.run_id }}@inbox.testmail.app (NOT promise.raganya@boxfusion.io)
            Lead name: AutoCI${{ github.run_id }}. Do NOT skip steps. Do NOT use new IDs.
            IMPORTANT: After initiate, expect "Resolution Pending" (entity). ALL directors must sign resolution before consent.
            CRITICAL: Only test YOUR OWN records (AutoCI${{ github.run_id }}). NEVER use another record as a substitute. If your record can't reach a step, mark it FAIL and explain why. If expected status doesn't match actual status, mark it FAIL — do NOT work around it.
          claude_args: "--max-turns 1000 --model sonnet --dangerously-skip-permissions --mcp-config .github/mcp-config.json"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RM_PASSWORD: ${{ secrets.RM_PASSWORD }}
          TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
          TESTMAIL_NAMESPACE: ${{ secrets.TESTMAIL_NAMESPACE }}

      - name: Post report to summary
        if: always()
        run: |
          REPORT="test-reports/${{ steps.report.outputs.name }}.md"
          REPO_URL="https://github.com/${{ github.repository }}/blob/main"
          if [ -f "$REPORT" ]; then
            echo "## Entity Loan — E2E Test Report" >> $GITHUB_STEP_SUMMARY
            echo "**Trigger:** ${{ steps.report.outputs.prefix }} | **Date:** $(date -u +%Y-%m-%d) | **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '/^## Summary/,/^---/p' "$REPORT" | head -20 >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Report" >> $GITHUB_STEP_SUMMARY
            echo "[View Report — ${{ steps.report.outputs.name }}.md](${REPO_URL}/${REPORT})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Plan" >> $GITHUB_STEP_SUMMARY
            echo "[e2e-entity-loan-application.md](${REPO_URL}/test-plans/e2e-entity-loan-application.md)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Entity Loan — No report generated" >> $GITHUB_STEP_SUMMARY
            echo "The test run did not produce a report file." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-entity-loan
          path: test-reports/

      - name: Notify Teams
        if: always()
        run: |
          REPORT="test-reports/${{ steps.report.outputs.name }}.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE=$(date -u +%Y-%m-%d)
          TRIGGER="${{ steps.report.outputs.prefix }}"

          # Determine result and color
          if [ "${{ job.status }}" = "success" ]; then
            RESULT="PASS"
            COLOR="00C853"
            ICON="✅"
          else
            RESULT="FAIL"
            COLOR="FF1744"
            ICON="❌"
          fi

          # Extract summary counts from report if it exists
          SUMMARY="No report generated"
          if [ -f "$REPORT" ]; then
            PASS_COUNT=$(grep -oP 'Pass\s*\|\s*\K\d+' "$REPORT" | head -1 || echo "?")
            FAIL_COUNT=$(grep -oP 'Fail\s*\|\s*\K\d+' "$REPORT" | head -1 || echo "?")
            TOTAL_COUNT=$(grep -oP 'Total\s*\|\s*\K\d+' "$REPORT" | head -1 || echo "?")
            SUMMARY="${TOTAL_COUNT} total | ${PASS_COUNT} passed | ${FAIL_COUNT} failed"
          fi

          # Send Adaptive Card to Teams via webhook
          curl -s -H "Content-Type: application/json" -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"Container\",
                      \"style\": \"emphasis\",
                      \"items\": [
                        {
                          \"type\": \"TextBlock\",
                          \"text\": \"${ICON} E2E Entity Loan — ${RESULT}\",
                          \"weight\": \"Bolder\",
                          \"size\": \"Medium\"
                        }
                      ]
                    },
                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"Trigger\", \"value\": \"${TRIGGER}\" },
                        { \"title\": \"Date\", \"value\": \"${DATE}\" },
                        { \"title\": \"Result\", \"value\": \"${RESULT}\" },
                        { \"title\": \"Summary\", \"value\": \"${SUMMARY}\" },
                        { \"title\": \"Run\", \"value\": \"#${{ github.run_number }}\" }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"View Run\",
                      \"url\": \"${RUN_URL}\"
                    },
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"View Report\",
                      \"url\": \"https://github.com/${{ github.repository }}/blob/main/${REPORT}\"
                    },
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"AzDO Test Plan\",
                      \"url\": \"https://dev.azure.com/boxfusion/markdown-test/_testPlans/execute?planId=99224\"
                    }
                  ]
                }
              }
            ]
          }" "${{ secrets.TEAMS_WEBHOOK_URL }}" || echo "Teams notification failed (webhook not configured)"

      - name: Commit report
        if: success()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add test-reports/*.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "CI: ${{ steps.report.outputs.prefix }} — entity-loan (#${{ github.run_number }})"
          git push || true
