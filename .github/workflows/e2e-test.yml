name: E2E Loan Application Test

on:
  workflow_dispatch:
    inputs:
      test_plan:
        description: "Test plan to execute"
        default: "e2e-personal-loan-application"
        type: choice
        options:
          - e2e-personal-loan-application
          - e2e-entity-loan-application
          - e2e-negative-edge-cases
  schedule:
    - cron: "0 0 * * *"

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests via Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running an automated E2E test on GitHub Actions CI. Run ID: ${{ github.run_id }}.

            Instructions:
            1. Read test-plans/RULES.md first (includes mandatory ID reuse rule and evidence capture rules)
            2. Read test-plans/${{ inputs.test_plan || 'e2e-personal-loan-application' }}.md
            3. Execute ALL test cases sequentially
            4. For TC-06: you MUST click Awaiting Review and review all verification tabs before clicking Finalise
            5. For EACH test case, record: the page URL, take screenshots at key moments, and save them to test-reports/screenshots/
            6. Generate a report and save it to test-reports/${{ inputs.test_plan || 'e2e-personal-loan-application' }}-ci-${{ github.run_id }}-$(date +%Y-%m-%dT%H-%M).md
            7. Each TC section in the report MUST include: URL field, Snapshots table, Input vs Output table
            8. Flag any unusual UI behavior, UX issues, or things that need improvement in a UX Observations section
            9. At the end, print RESULT: PASS or RESULT: FAIL

            Environment: QA at landbankcrm-adminportal-qa.shesha.app
            Admin account: admin / ${{ secrets.ADMIN_PASSWORD }}
            RM account: fatima.abrahams@landbank.co.za / ${{ secrets.RM_PASSWORD }}

            MANDATORY TEST IDs (reuse these — new IDs cost money):
            - 7708206169188 (Ian Houvet) — for Personal applicant and Entity director
            - 7304190225085 (Chamaine Houvet) — for Entity director / spouse
            - 6311115651080 (Xolile Ndlangana) — for Entity director
            - Entity reg: 2012/225386/07

            Generate a unique lead name using format: AutoCI${{ github.run_id }}

            Do NOT skip any steps. Do NOT use new ID numbers. Be efficient.
          claude_args: "--max-turns 400 --model sonnet --dangerously-skip-permissions --mcp-config .github/mcp-config.json"
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RM_PASSWORD: ${{ secrets.RM_PASSWORD }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports/

      - name: Commit report
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add test-reports/*.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "CI: Add test report from run #${{ github.run_number }}"
          git push || echo "Could not push report"
