name: Deploy Reports to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - test-reports/**
      - docs/**
      - .github/workflows/deploy-reports.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marked
        run: npm install marked@latest

      - name: Build reports site
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p _site/reports

          node << 'BUILDSCRIPT'
          const fs = require('fs');
          const path = require('path');
          const { marked } = require('marked');

          const SITE_URL = 'https://tshepiso-r.github.io/markdown-tests';
          const RUN_ID = process.env.GITHUB_RUN_ID || '';
          const REPO = process.env.GITHUB_REPOSITORY || 'tshepiso-r/markdown-tests';
          const NOW = new Date().toISOString().replace('T', ' ').replace(/\.\d+Z/, ' UTC');

          // Configure marked for GitHub-flavored markdown
          marked.setOptions({ gfm: true, breaks: true });

          // ─── Assertion parser ───
          function parseAssertions(content) {
            const lines = content.split('\n');
            let totalAssertions = 0;
            let passedAssertions = 0;

            for (const line of lines) {
              // Match table rows with YES/NO in Match column
              // Pattern: | ... | ... | ... | YES | or | ... | ... | ... | NO |
              const tableMatch = line.match(/\|[^|]+\|[^|]+\|[^|]+\|\s*(YES|NO)\s*\|/i);
              if (tableMatch) {
                totalAssertions++;
                if (tableMatch[1].toUpperCase() === 'YES') passedAssertions++;
                continue;
              }
              // Match table rows with [!] FAIL in the Match column
              const failMatch = line.match(/\|\s*\[!\]\s*FAIL\s*\|/i);
              if (failMatch) {
                totalAssertions++;
                // already counted as fail (not incrementing passed)
                continue;
              }
              // Match inline [x] pass markers (checkbox style)
              if (line.match(/\[x\]/i) && !line.match(/\|/)) {
                totalAssertions++;
                passedAssertions++;
                continue;
              }
              // Match inline [!] fail markers (not in tables, already handled above)
              if (line.match(/\*\*\[!\]/) && !line.match(/\|.*\|.*\|/)) {
                totalAssertions++;
                // fail - don't increment passed
                continue;
              }
            }

            return { total: totalAssertions, passed: passedAssertions };
          }

          // ─── Table-to-cards converter (post-process HTML) ───
          function tablesToCards(html) {
            // Replace each <table>...</table> with card layout
            return html.replace(/<table>([\s\S]*?)<\/table>/g, function(match, inner) {
              // Extract headers from <thead> or first <tr> with <th>
              const headerMatch = inner.match(/<thead>\s*<tr>([\s\S]*?)<\/tr>\s*<\/thead>/);
              const headers = [];
              if (headerMatch) {
                const thRegex = /<th[^>]*>([\s\S]*?)<\/th>/g;
                let thMatch;
                while ((thMatch = thRegex.exec(headerMatch[1])) !== null) {
                  headers.push(thMatch[1].trim());
                }
              }

              // If no headers found, try first row with <th> tags
              if (headers.length === 0) {
                const firstRowMatch = inner.match(/<tr>([\s\S]*?)<\/tr>/);
                if (firstRowMatch) {
                  const thRegex = /<th[^>]*>([\s\S]*?)<\/th>/g;
                  let thMatch;
                  while ((thMatch = thRegex.exec(firstRowMatch[1])) !== null) {
                    headers.push(thMatch[1].trim());
                  }
                }
              }

              // If still no headers, return original table
              if (headers.length === 0) return match;

              // Extract body rows from <tbody> or all <tr> with <td>
              const bodyMatch = inner.match(/<tbody>([\s\S]*?)<\/tbody>/);
              const bodyHTML = bodyMatch ? bodyMatch[1] : inner;
              const rows = [];
              const rowRegex = /<tr>([\s\S]*?)<\/tr>/g;
              let rowMatch;
              while ((rowMatch = rowRegex.exec(bodyHTML)) !== null) {
                const cells = [];
                const tdRegex = /<td[^>]*>([\s\S]*?)<\/td>/g;
                let tdMatch;
                while ((tdMatch = tdRegex.exec(rowMatch[1])) !== null) {
                  cells.push(tdMatch[1].trim());
                }
                if (cells.length > 0) rows.push(cells);
              }

              if (rows.length === 0) return match;

              // Build cards
              let cardsHTML = '<div class="card-grid">';
              for (const row of rows) {
                // Determine if this row has a match/status column
                const lastCell = row[row.length - 1] || '';
                const lastHeader = (headers[headers.length - 1] || '').toLowerCase();
                const isMatchCol = lastHeader === 'match' || lastHeader === 'followed';
                let statusClass = '';
                if (isMatchCol) {
                  if (lastCell.match(/YES/i)) statusClass = ' card-pass';
                  else if (lastCell.match(/NO|\[!\]|FAIL/i)) statusClass = ' card-fail';
                  else if (lastCell === '—' || lastCell === '-') statusClass = ' card-skip';
                }

                cardsHTML += '<div class="data-card' + statusClass + '">';
                for (let c = 0; c < row.length && c < headers.length; c++) {
                  const isStatus = isMatchCol && c === row.length - 1;
                  if (isStatus) {
                    // Render as a status badge
                    let badgeClass = 'badge-skip';
                    let label = row[c];
                    if (row[c].match(/YES/i)) { badgeClass = 'badge-pass'; label = 'PASS'; }
                    else if (row[c].match(/NO|\[!\]|FAIL/i)) { badgeClass = 'badge-fail'; label = 'FAIL'; }
                    else if (row[c] === '—' || row[c] === '-') { badgeClass = 'badge-skip'; label = 'N/A'; }
                    cardsHTML += '<div class="card-status"><span class="badge ' + badgeClass + '">' + label + '</span></div>';
                  } else {
                    cardsHTML += '<div class="card-field">';
                    cardsHTML += '<span class="card-label">' + headers[c] + '</span>';
                    cardsHTML += '<span class="card-value">' + row[c] + '</span>';
                    cardsHTML += '</div>';
                  }
                }
                cardsHTML += '</div>';
              }
              cardsHTML += '</div>';
              return cardsHTML;
            });
          }

          // Gather all report files
          const reportsDir = 'test-reports';
          const files = fs.readdirSync(reportsDir)
            .filter(f => f.endsWith('.md'))
            .sort()
            .reverse();

          // Parse each report for metadata
          const reports = files.map(file => {
            const content = fs.readFileSync(path.join(reportsDir, file), 'utf8');
            const name = file.replace('.md', '');

            // Extract date from filename (YYYY-MM-DD)
            const dateMatch = name.match(/(\d{4}-\d{2}-\d{2})/);
            const date = dateMatch ? dateMatch[1] : 'Unknown';

            // Parse Run Summary table for pass/fail counts
            let passed = 0, failed = 0, skipped = 0, total = 0, duration = '';
            const lines = content.split('\n');
            let inSummary = false;
            for (const line of lines) {
              if (line.includes('## Run Summary')) { inSummary = true; continue; }
              if (inSummary && line.startsWith('## ')) { inSummary = false; continue; }
              if (inSummary && line.startsWith('|')) {
                const cells = line.split('|').map(c => c.trim()).filter(Boolean);
                if (cells.length >= 2) {
                  const key = cells[0].toLowerCase();
                  const val = cells[1];
                  if (key.includes('total')) total = parseInt(val) || 0;
                  if (key.includes('passed')) passed = parseInt(val) || 0;
                  if (key.includes('failed')) failed = parseInt(val) || 0;
                  if (key.includes('skipped')) skipped = parseInt(val) || 0;
                  if (key.includes('duration')) duration = val;
                }
              }
            }

            // Extract title from first H1
            const titleMatch = content.match(/^# (.+)/m);
            const title = titleMatch ? titleMatch[1] : name;

            // Determine category
            let category = 'other';
            if (name.includes('entity-loan')) category = 'entity';
            else if (name.includes('personal-loan')) category = 'personal';
            else if (name.includes('workflow')) category = 'workflow';
            else if (name.includes('opportunity')) category = 'opportunity';

            const isCi = name.includes('ci-');

            // Parse assertions
            const assertions = parseAssertions(content);

            return { file, name, date, passed, failed, skipped, total, duration, title, category, isCi, content, assertions };
          });

          // Group by date
          const byDate = {};
          for (const r of reports) {
            if (!byDate[r.date]) byDate[r.date] = [];
            byDate[r.date].push(r);
          }
          const sortedDates = Object.keys(byDate).sort().reverse();

          // Compute totals across all reports
          const totalReports = reports.length;
          const totalPassed = reports.reduce((s, r) => s + r.passed, 0);
          const totalFailed = reports.reduce((s, r) => s + r.failed, 0);
          const totalCases = reports.reduce((s, r) => s + r.total, 0);
          const totalAssertionsPassed = reports.reduce((s, r) => s + r.assertions.passed, 0);
          const totalAssertionsAll = reports.reduce((s, r) => s + r.assertions.total, 0);

          // Category labels and badge classes
          const categoryMeta = {
            entity:      { label: 'Entity Loan',   badgeClass: 'badge-entity' },
            personal:    { label: 'Personal Loan',  badgeClass: 'badge-personal' },
            workflow:    { label: 'Workflow',        badgeClass: 'badge-workflow' },
            opportunity: { label: 'Opportunity',     badgeClass: 'badge-opportunity' },
            other:       { label: 'Other',           badgeClass: 'badge-other' },
          };

          // ─── Shared CSS ───
          const sharedCSS = `
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
            a { color: #58a6ff; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .container { max-width: 960px; margin: 0 auto; padding: 2rem; }
            h1 { color: #58a6ff; margin-bottom: 0.5rem; font-size: 1.8rem; }
            .subtitle { color: #8b949e; margin-bottom: 0.5rem; }
            .timestamp { color: #484f58; font-size: 0.8rem; margin-bottom: 2rem; }
            .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
            .stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; text-align: center; }
            .stat-value { font-size: 1.8rem; font-weight: 700; color: #f0f6fc; }
            .stat-label { color: #8b949e; font-size: 0.8rem; margin-top: 0.25rem; }
            .stat-pass .stat-value { color: #2dd4bf; }
            .stat-fail .stat-value { color: #f87171; }
            .date-group { margin-bottom: 2rem; }
            .date-group h2 { color: #f0f6fc; font-size: 1.1rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 0.5rem; }
            .date-group h2 .date-icon { color: #8b949e; }
            .report-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; flex-wrap: wrap; gap: 0.5rem; }
            .report-card:hover { border-color: #58a6ff; }
            .report-card .title { font-weight: 600; font-size: 0.95rem; }
            .report-card .meta { color: #8b949e; font-size: 0.8rem; margin-top: 0.25rem; }
            .badges { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
            .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
            .badge-pass { background: #1b4332; color: #2dd4bf; }
            .badge-fail { background: #4c1d1d; color: #f87171; }
            .badge-skip { background: #21262d; color: #8b949e; }
            .badge-entity { background: #1e3a5f; color: #7dd3fc; }
            .badge-personal { background: #3b1f5e; color: #c084fc; }
            .badge-workflow { background: #3b2f1e; color: #fbbf24; }
            .badge-opportunity { background: #1e3b2f; color: #6ee7b7; }
            .badge-other { background: #21262d; color: #8b949e; }
            .badge-ci { background: #1e293b; color: #38bdf8; }
            .badge-count { background: #21262d; color: #c9d1d9; font-variant-numeric: tabular-nums; }
            .badge-assertions { background: #1b2e1b; color: #6ee7b7; font-variant-numeric: tabular-nums; }
            .badge-assertions-warn { background: #3b2f1e; color: #fbbf24; font-variant-numeric: tabular-nums; }
            footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #21262d; color: #484f58; font-size: 0.8rem; text-align: center; }
          `;

          // ─── Build Index ───
          let indexCards = '';
          for (const date of sortedDates) {
            const dateReports = byDate[date];
            const formattedDate = new Date(date + 'T00:00:00Z').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
            indexCards += '<div class="date-group">';
            indexCards += '<h2><span class="date-icon">&#128197;</span> ' + formattedDate + ' <span class="badge badge-count">' + dateReports.length + ' report' + (dateReports.length !== 1 ? 's' : '') + '</span></h2>';
            for (const r of dateReports) {
              const cm = categoryMeta[r.category] || categoryMeta.other;
              const statusBadge = r.failed > 0
                ? '<span class="badge badge-fail">' + r.passed + '/' + r.total + ' PASS</span>'
                : '<span class="badge badge-pass">' + r.passed + '/' + r.total + ' PASS</span>';
              const ciBadge = r.isCi
                ? ' <a href="https://github.com/' + REPO + '/actions" class="badge badge-ci" title="CI Run">CI</a>'
                : '';
              const durationText = r.duration ? ' &middot; ' + r.duration : '';
              const assertBadgeClass = r.assertions.passed < r.assertions.total ? 'badge-assertions-warn' : 'badge-assertions';
              const assertBadge = r.assertions.total > 0
                ? ' <span class="badge ' + assertBadgeClass + '" title="Assertions">' + r.assertions.passed + '/' + r.assertions.total + ' assertions</span>'
                : '';
              indexCards += '<div class="report-card">';
              indexCards += '<div><a class="title" href="reports/' + r.name + '.html">' + r.title + '</a>';
              indexCards += '<div class="meta">' + r.name + durationText + '</div></div>';
              indexCards += '<div class="badges"><span class="badge ' + cm.badgeClass + '">' + cm.label + '</span> ' + statusBadge + assertBadge + ciBadge + '</div>';
              indexCards += '</div>';
            }
            indexCards += '</div>';
          }

          const indexHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
            + '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
            + '<title>LandBank CRM - E2E Test Reports</title>\n'
            + '<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9989;</text></svg>">\n'
            + '<style>' + sharedCSS + '</style>\n'
            + '</head>\n<body>\n<div class="container">\n'
            + '<h1>LandBank CRM - E2E Test Reports</h1>\n'
            + '<p class="subtitle">Automated test reports from markdown-driven testing</p>\n'
            + '<p class="timestamp">Last updated: ' + NOW + '</p>\n'
            + '<div class="stats">'
            + '<div class="stat"><div class="stat-value">' + totalReports + '</div><div class="stat-label">Total Reports</div></div>'
            + '<div class="stat stat-pass"><div class="stat-value">' + totalPassed + '</div><div class="stat-label">Tests Passed</div></div>'
            + '<div class="stat stat-fail"><div class="stat-value">' + totalFailed + '</div><div class="stat-label">Tests Failed</div></div>'
            + '<div class="stat"><div class="stat-value">' + totalCases + '</div><div class="stat-label">Total Test Cases</div></div>'
            + '<div class="stat stat-pass"><div class="stat-value">' + totalAssertionsPassed + '/' + totalAssertionsAll + '</div><div class="stat-label">Assertions Passed</div></div>'
            + '</div>\n'
            + indexCards
            + '<footer>Generated automatically from test-reports/ &middot; Powered by Claude Code &middot; <a href="https://github.com/' + REPO + '">Source</a></footer>\n'
            + '</div>\n</body>\n</html>';

          fs.writeFileSync('_site/index.html', indexHTML);

          // ─── Build individual report pages ───
          for (let i = 0; i < reports.length; i++) {
            const r = reports[i];
            const prev = i < reports.length - 1 ? reports[i + 1] : null;
            const next = i > 0 ? reports[i - 1] : null;

            let htmlBody = marked.parse(r.content);

            // Convert tables to cards
            htmlBody = tablesToCards(htmlBody);

            const navLinks = '<div class="report-nav">'
              + (prev ? '<a href="' + prev.name + '.html" class="nav-prev">&larr; ' + prev.name + '</a>' : '<span></span>')
              + (next ? '<a href="' + next.name + '.html" class="nav-next">' + next.name + ' &rarr;</a>' : '<span></span>')
              + '</div>';

            // Assertion summary bar
            const a = r.assertions;
            const pct = a.total > 0 ? Math.round((a.passed / a.total) * 100) : 100;
            const barColor = pct === 100 ? '#2dd4bf' : (pct >= 80 ? '#fbbf24' : '#f87171');
            const assertionBar = a.total > 0
              ? '<div class="assertion-bar">'
                + '<div class="assertion-bar-header">'
                + '<span class="assertion-bar-label">' + a.passed + '/' + a.total + ' assertions passed</span>'
                + '<span class="assertion-bar-pct">' + pct + '%</span>'
                + '</div>'
                + '<div class="assertion-bar-track">'
                + '<div class="assertion-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div>'
                + '</div>'
                + '</div>'
              : '';

            const reportCSS = `
              body { background: #0d1117; }
              .sticky-header { position: sticky; top: 0; z-index: 100; background: #161b22; border-bottom: 1px solid #30363d; padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; }
              .sticky-header .report-title { color: #f0f6fc; font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
              .sticky-header a { color: #58a6ff; text-decoration: none; font-size: 0.9rem; }
              .sticky-header a:hover { text-decoration: underline; }
              .assertion-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.25rem; margin: 0 auto 1.5rem; max-width: 960px; }
              .assertion-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
              .assertion-bar-label { color: #f0f6fc; font-weight: 600; font-size: 0.95rem; }
              .assertion-bar-pct { color: #8b949e; font-size: 0.85rem; font-weight: 600; }
              .assertion-bar-track { height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
              .assertion-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
              .markdown-body { max-width: 960px; margin: 0 auto; padding: 2rem; }
              .markdown-body h1 { color: #58a6ff; border-bottom: 1px solid #21262d; padding-bottom: 0.5rem; margin: 1.5rem 0 1rem; }
              .markdown-body h2 { color: #f0f6fc; margin: 1.5rem 0 0.75rem; }
              .markdown-body h3 { color: #c9d1d9; margin: 1rem 0 0.5rem; }
              .markdown-body hr { border: none; border-top: 1px solid #21262d; margin: 1.5rem 0; }
              .markdown-body blockquote { border-left: 3px solid #30363d; padding-left: 1rem; color: #8b949e; margin: 1rem 0; }
              .markdown-body code { background: #161b22; padding: 0.15rem 0.35rem; border-radius: 4px; font-size: 0.9em; }
              .markdown-body pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
              .markdown-body pre code { background: none; padding: 0; }
              .markdown-body strong { color: #f0f6fc; }
              .markdown-body li { margin: 0.25rem 0; }
              .markdown-body ul, .markdown-body ol { padding-left: 1.5rem; margin: 0.5rem 0; }
              .report-nav { display: flex; justify-content: space-between; margin: 2rem 0 1rem; padding-top: 1rem; border-top: 1px solid #21262d; }
              .report-nav a { color: #58a6ff; font-size: 0.85rem; }
              .report-nav .nav-prev { text-align: left; }
              .report-nav .nav-next { text-align: right; }
              .card-grid { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
              .data-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.75rem 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem 1.5rem; align-items: start; }
              .data-card.card-pass { border-left: 3px solid #2dd4bf; }
              .data-card.card-fail { border-left: 3px solid #f87171; }
              .data-card.card-skip { border-left: 3px solid #484f58; }
              .card-field { display: flex; flex-direction: column; min-width: 0; }
              .card-label { color: #8b949e; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.15rem; }
              .card-value { color: #f0f6fc; font-size: 0.85rem; word-break: break-word; }
              .card-status { display: flex; align-items: center; justify-content: flex-end; }
              @media (max-width: 600px) {
                .data-card { grid-template-columns: 1fr; }
                .card-status { justify-content: flex-start; }
                .assertion-bar { margin-left: 1rem; margin-right: 1rem; }
                .markdown-body { padding: 1rem; }
              }
            `;

            const reportHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
              + '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
              + '<title>' + r.name + '</title>\n'
              + '<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128203;</text></svg>">\n'
              + '<style>' + sharedCSS + reportCSS + '</style>\n'
              + '</head>\n<body>\n'
              + '<div class="sticky-header"><a href="../">&larr; All Reports</a><span class="report-title">' + r.title + '</span><span></span></div>\n'
              + assertionBar + '\n'
              + '<div class="markdown-body">\n'
              + htmlBody + '\n'
              + navLinks + '\n'
              + '</div>\n'
              + '</body>\n</html>';

            fs.writeFileSync('_site/reports/' + r.name + '.html', reportHTML);
          }

          // ─── 404 page ───
          const notFoundHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
            + '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
            + '<title>404 - Not Found</title>\n'
            + '<style>' + sharedCSS + '\n'
            + '.four04 { text-align: center; padding: 4rem 2rem; }\n'
            + '.four04 h1 { font-size: 4rem; color: #f87171; margin-bottom: 1rem; }\n'
            + '.four04 p { color: #8b949e; margin-bottom: 2rem; font-size: 1.1rem; }\n'
            + '.four04 a { color: #58a6ff; font-size: 1rem; }\n'
            + '</style>\n'
            + '</head>\n<body>\n<div class="container four04">\n'
            + '<h1>404</h1>\n'
            + '<p>This report does not exist or may have been removed.</p>\n'
            + '<a href="' + SITE_URL + '/">&larr; Back to all reports</a>\n'
            + '</div>\n</body>\n</html>';

          fs.writeFileSync('_site/404.html', notFoundHTML);

